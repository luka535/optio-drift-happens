version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: optio_db
    environment:
      POSTGRES_USER: optio_user
      POSTGRES_PASSWORD: optio_password
      POSTGRES_DB: drift_happens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optio_user -d drift_happens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: optio_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: